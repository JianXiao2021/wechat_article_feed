{% extends "base.html" %}
{% block title %}登录 - 微信文章阅读器{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>微信文章阅读器</h1>
    <p class="subtitle">关注公众号，聚合阅读最新文章</p>

    <form class="auth-form" method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autocomplete="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
    </form>

    <p class="auth-link">
        还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </p>
</div>
{% endblock %}
