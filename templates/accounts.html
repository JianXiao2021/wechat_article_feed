{% extends "base.html" %}
{% block title %}关注管理 - 微信文章阅读器{% endblock %}

{% block content %}
<div class="page-header">
    <h1>关注管理</h1>
</div>

<!-- Search and add account -->
<div class="add-section">
    <div class="input-row">
        <input type="text" id="searchKeyword" placeholder="输入公众号名称搜索" onkeydown="if(event.key==='Enter')searchAccount()">
        <button class="btn btn-primary btn-small" id="searchBtn" onclick="searchAccount()">搜索</button>
    </div>
    <div id="searchResults" class="search-results"></div>
</div>

<div style="height:1px;background:var(--border);"></div>

<!-- Subscribed accounts list -->
<div id="accountsList"></div>
<div class="loading" id="loadingIndicator" style="display:none;">
    <div class="loading-spinner"></div>
    <div>加载中...</div>
</div>
<div class="empty-state" id="emptyState" style="display:none;">
    <p>还没有关注任何公众号</p>
    <p style="margin-top:8px;">通过上方搜索公众号名称来关注</p>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block extra_scripts %}
<script>
function showToast(msg, duration) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration || 2000);
}

function proxyImg(url) {
    if (!url) return '';
    return '/api/proxy/image?url=' + encodeURIComponent(url);
}

async function searchAccount() {
    const keyword = document.getElementById('searchKeyword').value.trim();
    if (!keyword) {
        showToast('请输入搜索关键词');
        return;
    }

    const container = document.getElementById('searchResults');
    container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>搜索中...</div></div>';

    try {
        const resp = await fetch('/api/accounts/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword}),
        });
        const data = await resp.json();

        if (data.need_wx_login) {
            container.innerHTML = '<p style="color:var(--text-secondary);font-size:0.875rem;">请先扫码登录微信</p>';
            return;
        }

        if (!data.success || !data.accounts || data.accounts.length === 0) {
            container.innerHTML = '<p style="color:var(--text-secondary);font-size:0.875rem;padding:12px 0;">未找到相关公众号</p>';
            return;
        }

        container.innerHTML = '';
        data.accounts.forEach((acct, idx) => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
                <img class="avatar" src="${proxyImg(acct.round_head_img)}" onerror="this.style.display='none'">
                <div class="info">
                    <div class="name">${acct.nickname}</div>
                    <div class="alias">${acct.alias || ''}</div>
                </div>
                <button class="btn btn-primary btn-small" id="subBtn${idx}" onclick='subscribeAccount(${JSON.stringify(acct).replace(/'/g, "&#39;")}, "subBtn${idx}")'>关注</button>
            `;
            container.appendChild(item);
        });
    } catch (e) {
        container.innerHTML = '<p style="color:var(--danger);font-size:0.875rem;">搜索失败</p>';
    }
}

async function subscribeAccount(acct, btnId) {
    const btn = document.getElementById(btnId);
    if (btn) {
        btn.disabled = true;
        btn.textContent = '关注中...';
    }

    try {
        const resp = await fetch('/api/accounts/subscribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(acct),
        });
        const data = await resp.json();
        showToast(data.msg);
        if (data.success) {
            if (btn) {
                btn.textContent = '已关注';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline');
            }
            loadAccounts();
        } else if (btn) {
            btn.disabled = false;
            btn.textContent = '关注';
        }
    } catch (e) {
        showToast('关注失败');
        if (btn) {
            btn.disabled = false;
            btn.textContent = '关注';
        }
    }
}

async function unsubscribe(accountId, name) {
    if (!confirm(`确定取消关注 ${name} 吗？`)) return;

    try {
        const resp = await fetch(`/api/accounts/${accountId}/unsubscribe`, {method: 'POST'});
        const data = await resp.json();
        if (data.success) {
            showToast('已取消关注');
            loadAccounts();
        }
    } catch (e) {
        showToast('操作失败');
    }
}

async function loadAccounts() {
    const container = document.getElementById('accountsList');
    const loading = document.getElementById('loadingIndicator');
    const empty = document.getElementById('emptyState');

    loading.style.display = 'block';
    empty.style.display = 'none';

    try {
        const resp = await fetch('/api/accounts');
        const accounts = await resp.json();

        loading.style.display = 'none';

        if (accounts.length === 0) {
            container.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        container.innerHTML = '';
        accounts.forEach(acct => {
            const card = document.createElement('div');
            card.className = 'account-card';
            card.innerHTML = `
                <img class="avatar" src="${proxyImg(acct.round_head_img)}" onerror="this.style.background='var(--border)'">
                <div class="info">
                    <div class="name">${acct.nickname}</div>
                    <div class="detail">${acct.alias ? '@' + acct.alias + ' · ' : ''}${acct.article_count} 篇文章</div>
                </div>
                <button class="btn btn-small btn-outline" onclick="unsubscribe(${acct.id}, '${acct.nickname.replace(/'/g, "\\'")}')">取消关注</button>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        loading.style.display = 'none';
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

loadAccounts();
</script>
{% endblock %}
