{% extends "base.html" %}
{% block title %}关注管理 - 微信文章阅读器{% endblock %}

{% block content %}
<div class="page-header">
    <h1>关注管理</h1>
</div>

<!-- Search and add account -->
<div class="add-section">
    <div class="input-row">
        <input type="text" id="searchKeyword" placeholder="输入公众号名称搜索" onkeydown="if(event.key==='Enter')searchAccount()">
        <button class="btn btn-primary btn-small" id="searchBtn" onclick="searchAccount()">搜索</button>
    </div>
    <div id="searchResults" class="search-results"></div>
</div>

<div style="height:1px;background:var(--border);"></div>

<!-- Group management section -->
<div class="group-section">
    <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:0.875rem;font-weight:500;">分组管理</span>
        <button class="btn btn-small btn-outline" onclick="showCreateGroup()">+ 新建分组</button>
    </div>
    <div id="createGroupForm" style="display:none;padding:0 16px 12px;">
        <div class="input-row">
            <input type="text" id="newGroupName" placeholder="输入分组名称" onkeydown="if(event.key==='Enter')createGroup()">
            <button class="btn btn-primary btn-small" onclick="createGroup()">创建</button>
            <button class="btn btn-small btn-outline" onclick="hideCreateGroup()">取消</button>
        </div>
    </div>
    <div id="groupList"></div>
</div>

<div style="height:1px;background:var(--border);"></div>

<!-- Subscribed accounts list -->
<div id="accountsList"></div>
<div class="loading" id="loadingIndicator" style="display:none;">
    <div class="loading-spinner"></div>
    <div>加载中...</div>
</div>
<div class="empty-state" id="emptyState" style="display:none;">
    <p>还没有关注任何公众号</p>
    <p style="margin-top:8px;">通过上方搜索公众号名称来关注</p>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block extra_scripts %}
<script>
let allGroups = [];

function showToast(msg, duration) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration || 2000);
}

function proxyImg(url) {
    if (!url) return '';
    return '/api/proxy/image?url=' + encodeURIComponent(url);
}

// ---- Group management ----

function showCreateGroup() {
    document.getElementById('createGroupForm').style.display = 'block';
    document.getElementById('newGroupName').focus();
}

function hideCreateGroup() {
    document.getElementById('createGroupForm').style.display = 'none';
    document.getElementById('newGroupName').value = '';
}

async function loadGroups() {
    try {
        const resp = await fetch('/api/groups');
        allGroups = await resp.json();
        renderGroupList();
    } catch (e) {
        console.error('Failed to load groups', e);
    }
}

function renderGroupList() {
    const container = document.getElementById('groupList');
    if (allGroups.length === 0) {
        container.innerHTML = '<p style="padding:0 16px 12px;font-size:0.8125rem;color:var(--text-secondary);">暂无分组，点击上方按钮创建</p>';
        return;
    }
    container.innerHTML = '';
    allGroups.forEach(g => {
        const item = document.createElement('div');
        item.className = 'group-item';
        const isDefault = g.name === '默认';
        item.innerHTML = `
            <span class="group-name">${g.name}</span>
            <span class="group-count">${g.account_count} 个公众号</span>
            <button class="btn btn-small btn-outline" onclick="renameGroup(${g.id}, '${g.name.replace(/'/g, "\\'")}')">重命名</button>
            ${isDefault ? '' : `<button class="btn btn-small btn-outline" style="color:var(--danger);border-color:var(--danger);" onclick="deleteGroup(${g.id}, '${g.name.replace(/'/g, "\\'")}')">删除</button>`}
        `;
        container.appendChild(item);
    });
}

async function createGroup() {
    const name = document.getElementById('newGroupName').value.trim();
    if (!name) {
        showToast('请输入分组名称');
        return;
    }
    try {
        const resp = await fetch('/api/groups', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name}),
        });
        const data = await resp.json();
        if (data.success) {
            showToast('分组创建成功');
            hideCreateGroup();
            loadGroups();
            loadAccounts();
        } else {
            showToast(data.msg);
        }
    } catch (e) {
        showToast('创建失败');
    }
}

async function renameGroup(groupId, oldName) {
    const newName = prompt('请输入新的分组名称', oldName);
    if (!newName || newName.trim() === oldName) return;
    try {
        const resp = await fetch(`/api/groups/${groupId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: newName.trim()}),
        });
        const data = await resp.json();
        if (data.success) {
            showToast('重命名成功');
            loadGroups();
            loadAccounts();
        } else {
            showToast(data.msg);
        }
    } catch (e) {
        showToast('重命名失败');
    }
}

async function deleteGroup(groupId, name) {
    if (!confirm(`确定删除分组「${name}」吗？该分组下的公众号不会被取消关注。`)) return;
    try {
        const resp = await fetch(`/api/groups/${groupId}`, {method: 'DELETE'});
        const data = await resp.json();
        if (data.success) {
            showToast('已删除分组');
            loadGroups();
            loadAccounts();
        } else {
            showToast(data.msg);
        }
    } catch (e) {
        showToast('删除失败');
    }
}

async function setAccountGroup(accountId, groupId) {
    try {
        const resp = await fetch(`/api/accounts/${accountId}/group`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({group_id: groupId || null}),
        });
        const data = await resp.json();
        if (data.success) {
            showToast('分组已更新');
            loadGroups();
        } else {
            showToast(data.msg);
        }
    } catch (e) {
        showToast('设置分组失败');
    }
}

// ---- Account search & subscribe ----

async function searchAccount() {
    const keyword = document.getElementById('searchKeyword').value.trim();
    if (!keyword) {
        showToast('请输入搜索关键词');
        return;
    }

    const container = document.getElementById('searchResults');
    container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>搜索中...</div></div>';

    try {
        const resp = await fetch('/api/accounts/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword}),
        });
        const data = await resp.json();

        if (data.need_wx_login) {
            container.innerHTML = '<p style="color:var(--text-secondary);font-size:0.875rem;">请先扫码登录微信</p>';
            return;
        }

        if (!data.success || !data.accounts || data.accounts.length === 0) {
            container.innerHTML = '<p style="color:var(--text-secondary);font-size:0.875rem;padding:12px 0;">未找到相关公众号</p>';
            return;
        }

        container.innerHTML = '';
        data.accounts.forEach((acct, idx) => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
                <img class="avatar" src="${proxyImg(acct.round_head_img)}" onerror="this.style.display='none'">
                <div class="info">
                    <div class="name">${acct.nickname}</div>
                    <div class="alias">${acct.alias || ''}</div>
                </div>
                <button class="btn btn-primary btn-small" id="subBtn${idx}" onclick='subscribeAccount(${JSON.stringify(acct).replace(/'/g, "&#39;")}, "subBtn${idx}")'>关注</button>
            `;
            container.appendChild(item);
        });
    } catch (e) {
        container.innerHTML = '<p style="color:var(--danger);font-size:0.875rem;">搜索失败</p>';
    }
}

async function subscribeAccount(acct, btnId) {
    const btn = document.getElementById(btnId);
    if (btn) {
        btn.disabled = true;
        btn.textContent = '关注中...';
    }

    try {
        const resp = await fetch('/api/accounts/subscribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(acct),
        });
        const data = await resp.json();
        showToast(data.msg);
        if (data.success) {
            if (btn) {
                btn.textContent = '已关注';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline');
            }
            loadAccounts();
        } else if (btn) {
            btn.disabled = false;
            btn.textContent = '关注';
        }
    } catch (e) {
        showToast('关注失败');
        if (btn) {
            btn.disabled = false;
            btn.textContent = '关注';
        }
    }
}

async function unsubscribe(accountId, name) {
    if (!confirm(`确定取消关注 ${name} 吗？`)) return;

    try {
        const resp = await fetch(`/api/accounts/${accountId}/unsubscribe`, {method: 'POST'});
        const data = await resp.json();
        if (data.success) {
            showToast('已取消关注');
            loadAccounts();
            loadGroups();
        }
    } catch (e) {
        showToast('操作失败');
    }
}

async function loadAccounts() {
    const container = document.getElementById('accountsList');
    const loading = document.getElementById('loadingIndicator');
    const empty = document.getElementById('emptyState');

    loading.style.display = 'block';
    empty.style.display = 'none';

    try {
        const resp = await fetch('/api/accounts');
        const accounts = await resp.json();

        loading.style.display = 'none';

        if (accounts.length === 0) {
            container.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        container.innerHTML = '';
        accounts.forEach(acct => {
            const card = document.createElement('div');
            card.className = 'account-card';

            let groupOptions = '';
            allGroups.forEach(g => {
                const selected = acct.group_id === g.id ? 'selected' : '';
                groupOptions += `<option value="${g.id}" ${selected}>${g.name}</option>`;
            });

            card.innerHTML = `
                <img class="avatar" src="${proxyImg(acct.round_head_img)}" onerror="this.style.background='var(--border)'">
                <div class="info">
                    <div class="name">${acct.nickname}</div>
                    <div class="detail">${acct.alias ? '@' + acct.alias : ''}</div>
                </div>
                <select class="group-select" onchange="setAccountGroup(${acct.id}, this.value)">${groupOptions}</select>
                <button class="btn btn-small btn-outline" onclick="unsubscribe(${acct.id}, '${acct.nickname.replace(/'/g, "\\'")}')">取消关注</button>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        loading.style.display = 'none';
        container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
}

// Init
loadGroups();
loadAccounts();
</script>
{% endblock %}
