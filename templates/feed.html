{% extends "base.html" %}
{% block title %}信息流 - 微信文章阅读器{% endblock %}

{% block content %}
{% if not wx_logged_in %}
<div style="background:#fdf6ec;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);">
    <span style="font-size:0.8125rem;color:#e6a23c;">微信未登录，需要登录后才能获取文章</span>
    <a href="{{ url_for('wx_login_page') }}" class="btn btn-small btn-primary">去登录</a>
</div>
{% endif %}

<div class="page-header">
    <h1>信息流</h1>
    <div style="display:flex;align-items:center;gap:8px;">
        <span id="syncIndicator" style="display:none;font-size:0.7rem;color:var(--text-secondary);">同步中...</span>
        <button class="btn btn-small btn-outline" id="refreshBtn" onclick="refreshFeed()">刷新文章</button>
    </div>
</div>

<div class="group-tabs" id="groupTabs" style="display:none;"></div>

<div id="feedContainer"></div>
<div id="loadMoreSection" style="display:none; text-align:center; padding:16px;">
    <button class="btn btn-outline" id="loadMoreBtn" onclick="loadMore()">加载更多</button>
</div>
<div class="loading" id="loadingIndicator" style="display:none;">
    <div class="loading-spinner"></div>
    <div>加载中...</div>
</div>
<div class="empty-state" id="emptyState" style="display:none;">
    <p id="emptyMsg">还没有关注任何公众号</p>
    <p id="emptyHint" style="margin-top:8px;"><a href="{{ url_for('accounts_page') }}">去关注公众号</a></p>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block extra_scripts %}
<script>
// ---- State ----
let currentGroupId = null;
let nextCursor = null;
let isLoading = false;
let hasMore = true;
let isSyncing = false;
let backfillAccounts = [];  // [{account_id, next_begin}]
let totalNewArticles = 0;
let totalArticlesShown = 0;
const FEED_PAGE_SIZE = 10;

// ---- Helpers ----
function proxyImg(url) {
    if (!url) return '';
    return '/api/proxy/image?url=' + encodeURIComponent(url);
}

function formatTime(ts) {
    const d = new Date(ts * 1000);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 604800) return Math.floor(diff / 86400) + '天前';
    const month = d.getMonth() + 1;
    const day = d.getDate();
    if (d.getFullYear() === now.getFullYear()) return month + '月' + day + '日';
    return d.getFullYear() + '年' + month + '月' + day + '日';
}

function showToast(msg, duration) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration || 2000);
}

function renderArticle(art) {
    const card = document.createElement('div');
    card.className = 'article-card' + (art.is_read ? ' read' : '');
    card.onclick = () => openArticle(art, card);

    let coverHtml = '';
    if (art.cover) {
        coverHtml = `<img class="article-cover" src="${proxyImg(art.cover)}" loading="lazy" onerror="this.style.display='none'">`;
    }

    card.innerHTML = `
        <div class="article-info">
            <div class="article-title">${art.title}</div>
            <div class="article-meta">
                ${art.account_avatar ? `<img class="account-avatar" src="${proxyImg(art.account_avatar)}" onerror="this.style.display='none'">` : ''}
                <span>${art.account_name}</span>
                <span>${formatTime(art.create_time)}</span>
            </div>
        </div>
        ${coverHtml}
    `;
    return card;
}

function openArticle(art, card) {
    fetch('/api/history/record', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({article_id: art.id}),
    });
    if (card) card.classList.add('read');
    window.open(art.link, '_blank');
}

// ---- Groups ----
async function loadGroups() {
    try {
        const resp = await fetch('/api/groups');
        const groups = await resp.json();

        const container = document.getElementById('groupTabs');
        if (groups.length === 0) {
            // No groups at all — show empty state
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyMsg').textContent = '还没有关注任何公众号';
            document.getElementById('emptyHint').innerHTML = '<a href="{{ url_for("accounts_page") }}">去关注公众号</a>';
            return;
        }

        container.style.display = 'flex';
        container.innerHTML = '';

        // No "全部" tab — first group is default
        groups.forEach((g, idx) => {
            const tab = document.createElement('div');
            tab.className = 'tab' + (idx === 0 ? ' active' : '');
            tab.textContent = g.name;
            tab.dataset.groupId = g.id;
            tab.onclick = () => switchGroup(g.id, tab);
            container.appendChild(tab);
        });

        // Activate first group
        currentGroupId = groups[0].id;
        await loadFeed();
        // Auto-sync in background
        syncFeed();
    } catch (e) {
        console.error('Failed to load groups', e);
    }
}

function switchGroup(groupId, tabEl) {
    if (groupId === currentGroupId) return;
    currentGroupId = groupId;
    document.querySelectorAll('#groupTabs .tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');

    // Reset state
    nextCursor = null;
    hasMore = true;
    totalNewArticles = 0;
    totalArticlesShown = 0;
    backfillAccounts = [];
    document.getElementById('feedContainer').innerHTML = '';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('loadMoreSection').style.display = 'none';

    loadFeed().then(() => syncFeed());
}

// ---- Feed Loading (from DB cache) ----
async function loadFeed() {
    if (isLoading) return;
    isLoading = true;
    document.getElementById('loadingIndicator').style.display = 'block';
    document.getElementById('loadMoreSection').style.display = 'none';

    try {
        let url = `/api/feed?group_id=${currentGroupId}`;
        if (nextCursor !== null) {
            url += `&cursor=${nextCursor}`;
        }
        const resp = await fetch(url);
        const data = await resp.json();

        if (!nextCursor && data.articles.length === 0) {
            const emptyMsg = document.getElementById('emptyMsg');
            const emptyHint = document.getElementById('emptyHint');
            if (!data.has_subscriptions) {
                emptyMsg.textContent = '还没有关注任何公众号';
                emptyHint.innerHTML = '<a href="{{ url_for("accounts_page") }}">去关注公众号</a>';
            } else {
                emptyMsg.textContent = '该分组暂无文章';
                emptyHint.innerHTML = '文章同步中，请稍候...';
            }
            document.getElementById('emptyState').style.display = 'block';
            hasMore = false;
            return;
        }

        const container = document.getElementById('feedContainer');
        data.articles.forEach(art => {
            container.appendChild(renderArticle(art));
        });

        totalArticlesShown += data.articles.length;
        hasMore = data.has_more;
        nextCursor = data.next_cursor;

        if (hasMore) {
            document.getElementById('loadMoreSection').style.display = 'block';
        }
    } catch (e) {
        showToast('加载失败，请稍后重试');
    } finally {
        isLoading = false;
        document.getElementById('loadingIndicator').style.display = 'none';
    }
}

// ---- Load More (with on-demand backfill) ----
async function loadMore() {
    if (isLoading || !hasMore) return;

    // Check if we need backfill: if we've shown most of the new articles
    if (backfillAccounts.length > 0 && totalNewArticles > 0 &&
        totalArticlesShown + FEED_PAGE_SIZE > totalNewArticles) {
        await doBackfill();
    }

    await loadFeed();
}

// ---- Helpers for concurrent refresh ----
// Fire requests with 1s stagger; render as each response arrives.
function staggeredRefresh(accounts, force, syncGroupId) {
    let doneCount = 0;
    let totalFetched = 0;
    let totalSkipped = 0;
    let hasNewArticles = false;
    const indicator = document.getElementById('syncIndicator');

    return new Promise(resolve => {
        function onDone() {
            doneCount++;
            // Show progress only if actually fetching (not all skipped)
            if (doneCount > totalSkipped) {
                indicator.textContent = `同步中 ${doneCount - totalSkipped}/${accounts.length - totalSkipped}...`;
            }
            if (doneCount >= accounts.length) {
                resolve({totalFetched, totalSkipped});
            }
        }

        accounts.forEach((acct, i) => {
            // Stagger: request i fires at i*1000 ms
            setTimeout(() => {
                if (syncGroupId !== currentGroupId) { onDone(); return; }

                fetch('/api/feed/refresh_account', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({account_id: acct.id, force: force}),
                })
                .then(r => r.json())
                .then(async data => {
                    if (syncGroupId !== currentGroupId) return;
                    if (data.skipped) totalSkipped++;
                    if (data.backfill) backfillAccounts.push(data.backfill);
                    if (data.fetched > 0) {
                        totalFetched += data.fetched;
                        // Reload feed to show new articles
                        nextCursor = null;
                        hasMore = true;
                        totalArticlesShown = 0;
                        document.getElementById('feedContainer').innerHTML = '';
                        document.getElementById('emptyState').style.display = 'none';
                        document.getElementById('loadMoreSection').style.display = 'none';
                        await loadFeed();
                    }
                })
                .catch(e => console.error('Refresh failed', acct.nickname, e))
                .finally(() => onDone());
            }, i * 1000);
        });
    });
}

// ---- Auto Sync (background, on page load / tab switch) ----
async function syncFeed() {
    if (isSyncing || !currentGroupId) return;
    isSyncing = true;

    const indicator = document.getElementById('syncIndicator');
    indicator.style.display = 'inline';
    indicator.textContent = '检查更新中...';

    try {
        const acctResp = await fetch(`/api/accounts?group_id=${currentGroupId}`);
        const accounts = await acctResp.json();
        if (!accounts.length) { indicator.style.display = 'none'; isSyncing = false; return; }

        const {totalFetched} = await staggeredRefresh(accounts, false, currentGroupId);
        if (totalFetched > 0) {
            showToast(`获取了 ${totalFetched} 篇新文章`);
        }
    } catch (e) {
        console.error('Sync failed', e);
    } finally {
        isSyncing = false;
        indicator.style.display = 'none';
    }
}

// ---- On-demand Backfill ----
async function doBackfill() {
    if (backfillAccounts.length === 0) return;

    try {
        const resp = await fetch('/api/feed/backfill', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({accounts: backfillAccounts}),
        });
        const data = await resp.json();
        if (data.fetched > 0) {
            totalNewArticles += data.fetched;
        }
        backfillAccounts = data.backfill_accounts || [];
    } catch (e) {
        console.error('Backfill failed', e);
    }
}

// ---- Manual Refresh (force=true, bypasses cooldown) ----
async function refreshFeed() {
    if (isSyncing || !currentGroupId) return;
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '刷新中...';
    isSyncing = true;

    const indicator = document.getElementById('syncIndicator');
    indicator.style.display = 'inline';
    indicator.textContent = '检查更新中...';
    backfillAccounts = [];

    try {
        const acctResp = await fetch(`/api/accounts?group_id=${currentGroupId}`);
        const accounts = await acctResp.json();

        const {totalFetched, totalSkipped} = await staggeredRefresh(accounts, true, currentGroupId);

        totalNewArticles = totalFetched;
        let msg = totalFetched > 0 ? `获取了 ${totalFetched} 篇新文章` : '没有新文章';
        if (totalSkipped > 0) msg += `（${totalSkipped}个使用缓存）`;
        showToast(msg);
    } catch (e) {
        showToast('刷新失败');
    } finally {
        isSyncing = false;
        btn.disabled = false;
        btn.textContent = '刷新文章';
        indicator.style.display = 'none';
    }
}

// ---- Init ----
loadGroups();
</script>
{% endblock %}
