{% extends "base.html" %}
{% block title %}注册 - 微信文章阅读器{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>创建账号</h1>
    <p class="subtitle">注册后即可关注公众号阅读文章</p>

    <form class="auth-form" method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autocomplete="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required autocomplete="new-password" placeholder="至少4个字符">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
    </form>

    <p class="auth-link">
        已有账号？<a href="{{ url_for('login') }}">去登录</a>
    </p>
</div>
{% endblock %}
